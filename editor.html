<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地圖區塊視覺化編輯器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .panel {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* 地圖是 36x36, 每個區塊 24x20 */
        #mapCanvas {
            background-color: #000;
            border: 2px solid #555;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button,
        input[type="file"] {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1177bb;
        }

        #infoBox {
            font-family: monospace;
            background: #1e1e1e;
            padding: 10px;
            border-left: 4px solid #0e639c;
            height: 200px;
            overflow-y: auto;
        }

        /* 點擊選單 */
        #editPanel {
            display: none;
            background: #252526;
            border: 1px solid #0e639c;
            border-radius: 8px;
            padding: 14px;
            margin-top: 12px;
        }

        #editPanel h4 {
            margin: 0 0 10px 0;
            color: #9cdcfe;
            font-size: 14px;
        }

        #editPanel label {
            display: block;
            font-size: 12px;
            color: #9cdcfe;
            margin-top: 8px;
        }

        #editPanel input[type="number"],
        #editPanel select {
            width: 100%;
            box-sizing: border-box;
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 4px 6px;
            margin-top: 2px;
            font-size: 12px;
        }

        .dir-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 4px;
            margin-top: 4px;
        }

        .dir-grid input {
            width: 100%;
            box-sizing: border-box;
        }

        .dir-center {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 18px;
        }

        #tilePickerWrap {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            max-height: 160px;
            overflow-y: auto;
            margin-top: 6px;
            background: #1e1e1e;
            padding: 4px;
            border-radius: 4px;
        }

        .tile-btn {
            width: 24px;
            height: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            padding: 0;
            image-rendering: pixelated;
        }

        .tile-btn.selected {
            border-color: #e51400;
        }

        #applyBtn {
            margin-top: 10px;
            width: 100%;
            background: #0e639c;
        }

        /* 標籤頁 */
        .tab-bar {
            display: flex;
            gap: 2px;
            margin-bottom: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 5px 4px;
            background: #3c3c3c;
            border: 1px solid #555;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            color: #aaa;
            font-size: 11px;
            text-align: center;
        }

        .tab-btn.active {
            background: #252526;
            color: #9cdcfe;
            border-color: #0e639c;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* 警告標籤 */
        .warn-badge {
            background: #c55;
            color: #fff;
            border-radius: 3px;
            font-size: 10px;
            padding: 1px 4px;
            margin-left: 4px;
        }

        /* 地點使用高亮 */
        .loc-used-cell {
            outline: 2px solid #f0c040;
        }

        /* 價格表 */
        #priceTable {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 6px;
        }

        #priceTable th {
            background: #1e1e1e;
            color: #9cdcfe;
            padding: 3px 5px;
            text-align: left;
            position: sticky;
            top: 0;
        }

        #priceTable td {
            padding: 2px 4px;
            border-bottom: 1px solid #333;
        }

        #priceTable input {
            width: 70px;
            background: #3c3c3c;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 1px 3px;
            font-size: 11px;
        }

        .price-wrap {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 2px;
        }

        /* 警告列表 */
        #warnList {
            font-size: 11px;
            color: #f48771;
            margin-top: 6px;
            max-height: 120px;
            overflow-y: auto;
        }

        #warnList div {
            padding: 2px 0;
            border-bottom: 1px solid #3a3a3a;
            cursor: pointer;
        }

        #warnList div:hover {
            background: #2a2a2a;
        }
    </style>
</head>

<body>

    <h2>地圖區塊視覺化編輯器 (PART?.PAK)</h2>

    <div class="container">
        <div class="panel">
            <!-- Canvas 大小: 36*24 = 864, 36*20 = 720 -->
            <canvas id="mapCanvas" width="864" height="720"></canvas>
        </div>

        <div class="panel controls">
            <div>
                <label>1. 載入 PART?.PAK (地圖圖庫與屬性):</label><br>
                <input type="file" id="mapFile" accept=".PAK">
            </div>
            <div>
                <label>2. 載入 SAVE_?.DSK (存檔地圖排版):</label><br>
                <input type="file" id="saveFile" accept=".DSK">
            </div>

            <hr style="border-color: #555; width: 100%;">

            <h3>目前選取區塊</h3>
            <div id="infoBox">
                等待點擊...
            </div>

            <div id="editPanel">
                <h4 id="editTitle" style="margin:0 0 6px 0;color:#9cdcfe;font-size:13px;">請點選地圖格子</h4>

                <div class="tab-bar">
                    <div class="tab-btn active" data-tab="tabTile">圖塊</div>
                    <div class="tab-btn" data-tab="tabLoc">地點</div>
                    <div class="tab-btn" data-tab="tabPrice">價格</div>
                    <div class="tab-btn" data-tab="tabWarn">⚠ 警告</div>
                </div>

                <!-- 圖塊頁 -->
                <div id="tabTile" class="tab-pane active"
                    style="border:1px solid #0e639c;padding:6px;border-radius:0 4px 4px 4px;">
                    <div style="font-size:11px;color:#888;margin-bottom:4px;">點選圖塊立即生效</div>
                    <div id="tilePickerWrap"></div>

                <!-- 地點頁 -->
                <div id="tabLoc" class="tab-pane"

                    <label>地點編號 (loc ID):</label>
                    <input type="number" id="editLocId" min="0" max="282"

                    <label style="margin-top:8px;display:block;">特殊地點代號 (0=土地/公園):</label>
                    <div style="display:flex;gap:6px;align-items:center;margin-top:2px;">
                        <input type="number" id="editSpecial" min="0" max="10"

                        <span id="specialNameDisplay" style="color:#ce9178;font-size:12px;"></span>
                    </div>

                    <label style="margin-top:8px;display:block;">地段編號 (0=非土地):</label>
                    <div style="display:flex;gap:6px;align-items:center;margin-top:2px;">
                        <input type="number" id="editSegId" min="0" max="99"
                            style="width:50px;background:#3c3c3c;color:#d4d4d4;border:1px solid #555;border-radius:4px;padding:4px 6px;">
                        <span id="segNameDisplay" style="color:#4ec9b0;font-size:12px;"></span>
                        <button id="addSegBtn" title="新增地段"
                            style="padding:2px 7px;font-size:12px;background:#2d7a2d;border:none;border-radius:3px;color:#fff;cursor:pointer;">＋</button>
                    </div>

                    <label style="margin-top:8px;display:block;">可行進方向（下個地點編號，0=不通）:</label>
                    <div class="dir-grid" style="margin-top:4px;">
                        <div></div>
                        <div><input type="number" id="editDirUp" min="0" max="282" placeholder="上"
                                style="width:100%;background:#3c3c3c;color:#d4d4d4;border:1px solid #555;border-radius:4px;padding:3px;text-align:center;">
                        </div>
                        <div></div>
                        <div><input type="number" id="editDirLeft" min="0" max="282" placeholder="左"
                                style="width:100%;background:#3c3c3c;color:#d4d4d4;border:1px solid #555;border-radius:4px;padding:3px;text-align:center;">
                        </div>
                        <div class="dir-center">✦</div>
                        <div><input type="number" id="editDirRight" min="0" max="282" placeholder="右"
                                style="width:100%;background:#3c3c3c;color:#d4d4d4;border:1px solid #555;border-radius:4px;padding:3px;text-align:center;">
                        </div>
                        <div></div>
                        <div><input type="number" id="editDirDown" min="0" max="282" placeholder="下"
                                style="width:100%;background:#3c3c3c;color:#d4d4d4;border:1px solid #555;border-radius:4px;padding:3px;text-align:center;">
                        </div>
                        <div></div>
                    </div>
                    <div id="dirWarnMsg" style="font-size:11px;color:#f48771;margin-top:4px;min-height:14px;"></div>
                </div>

                <!-- 價格頁 -->
                <div id="tabPrice" class="tab-pane"
                    style="border:1px solid #0e639c;padding:8px;border-radius:0 4px 4px 4px;">
                    <div style="font-size:11px;color:#888;margin-bottom:4px;">目前地段：<span id="priceSegLabel"
                            style="color:#4ec9b0;">-</span></div>
                    <div class="price-wrap">
                        <table id="priceTable">
                            <thead>
                                <tr>
                                    <th>欄位</th>
                                    <th>數值</th>
                                </tr>
                            </thead>
                            <tbody id="priceTbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 警告頁 -->
                <div id="tabWarn" class="tab-pane"
                    style="border:1px solid #0e639c;padding:8px;border-radius:0 4px 4px 4px;">
                    <div style="font-size:11px;color:#888;">點擊警告可跳至該格子</div>
                    <div id="warnList"></div>
                </div>
            </div>

            <button id="exportDskBtn">匯出 SAVE_?.DSK</button>
            <button id="exportPakBtn">匯出 PART?.PAK</button>
        </div>
    </div>

    <script>

        const infoBox = document.getElementById('infoBox');

        // 遊戲常數定義

        const TILE_W = 24;    // 每個區塊 24x20

            0, 0, 215, 0, 0, 235, 0, 0, 255, 36, 36, 255, 77, 77, 255, 117, 117, 255, 158, 158, 255, 202, 202, 255,
            73, 0, 121, 81, 4, 130, 89, 12, 138, 97, 20, 146, 109, 32, 154, 121, 45, 166, 130, 57, 174, 142, 69, 182,

            0, 89, 89, 0, 105, 105, 0, 121, 121, 0, 138, 138, 0, 154, 154, 0, 170, 170, 0, 186, 186, 0, 202, 202,
            0, 219, 219, 0, 239, 239, 0, 255, 255, 40, 255, 255, 85, 255, 255, 130, 255, 255, 174, 255, 255, 219, 255, 255,
            101, 77, 49, 138, 97, 57, 174, 113, 69, 210, 125, 73, 215, 134, 81, 215, 142, 93, 219, 150, 105, 223, 158, 117,
            227, 166, 130, 231, 174, 142, 235, 186, 154, 239, 194, 166, 243, 202, 178, 247, 215, 194, 251, 223, 206, 255, 235, 223,
            97, 32, 0, 105, 40, 0, 117, 49, 4, 125, 61, 12, 138, 69, 20, 150, 81, 32, 158, 93, 40, 170, 105, 53,
            178, 117, 65, 190, 134, 77, 202, 146, 93, 210, 162, 105, 223, 174, 121, 231, 190, 138, 243, 206, 158, 255, 223, 178,
            97, 69, 0, 121, 77, 0, 150, 81, 0, 178, 81, 0, 182, 93, 8, 190, 109, 24, 194, 125, 40, 202, 142, 57,
            210, 158, 77, 215, 170, 97, 223, 186, 117, 227, 198, 138, 235, 215, 162, 239, 227, 182, 247, 239, 206, 255, 251, 235,
            32, 73, 182, 40, 81, 186, 49, 93, 190, 61, 105, 198, 69, 113, 202, 81, 125, 210, 89, 138, 215, 101, 150, 219,
            113, 162, 227, 125, 174, 231, 138, 182, 235, 150, 194, 243, 162, 206, 247, 178, 219, 255, 190, 227, 255, 202, 235, 255,
            0, 61, 0, 0, 73, 0, 4, 85, 0, 4, 97, 0, 8, 109, 0, 16, 121, 0, 20, 134, 0, 28, 146, 0,
            36, 158, 0, 45, 174, 0, 57, 186, 0, 69, 198, 0, 81, 215, 0, 93, 227, 0, 109, 239, 0, 125, 255, 0,
            0, 0, 81, 0, 0, 93, 4, 4, 109, 12, 12, 125, 20, 20, 142, 28, 28, 154, 40, 40, 170, 53, 53, 186,
            69, 69, 202, 85, 85, 206, 101, 101, 215, 117, 117, 223, 138, 138, 231, 158, 158, 239, 178, 178, 247, 202, 202, 255,
            0, 0, 162, 0, 16, 182, 0, 40, 206, 0, 69, 231, 0, 105, 255, 0, 77, 235, 0, 57, 227, 0, 32, 219,
            0, 12, 210, 0, 0, 202, 255, 223, 0, 255, 255, 0, 255, 255, 182, 255, 235, 0, 255, 202, 0, 49, 178, 255
        ]);
        let isPaletteLoaded = true;
        let mapTilesData = [];
        let mapGrid = new Uint16Array(GRID_COLS * GRID_ROWS); // PAK 來的地點屬性
        let mapLayout = new Uint16Array(GRID_COLS * GRID_ROWS); // SAVE 來的實際地圖排版
        let isSaveLoaded = false; // 紀錄存檔是否載入
        let rawPakBuffer = null;  // 原始 PAK ArrayBuffer，匯出用
        let rawDskBuffer = null;  // 原始 DSK ArrayBuffer，匯出用
        let pakGroupPointers = []; // PAK 各組資料指標
        let dskGroupPointers = []; // DSK 各組資料指標

        // 路段名稱（從 PART?.PAK 第3組文字訊息，路段名由第27行開始）
        const SEGMENT_NAMES = ["", "台北市", "基隆市", "宜蘭縣", "蘇　澳", "太魯閣", "南投縣", "花蓮縣", "台東縣", "鵝巒鼻", "屏東縣", "高雄市", "台南市", "雲林縣", "台中市", "嘉義市", "新竹市", "桃園縣", "青島路", "濟南路", "青海路", "西藏路", "太原路", "瀋陽路", "松江路", "開封街", "南京路", "上海路", "南昌路", "武昌街", "漢口路", "成都路", "鎮江路", "杭州路", "錦州街", "廣州街", "福州街", "徐州街", "長春路", "南陽街", "昆明路", "延平路", "三民路", "五權路", ""];

        // 價格表欄位定義（DSK 第8組，每欄45個地段，90 bytes）
        const PRICE_FIELD_COUNT = 10;
        const PRICE_SEG_COUNT = 45;
        const PRICE_FIELD_SIZE = PRICE_SEG_COUNT * 2; // 90 bytes
        const PRICE_FIELDS = ['土地價格', '增值價格', '空地過路費', '一層過路費', '二層過路費', '三層過路費', '四層過路費', '五層過路費', '欄位8', '欄位9'];
        let priceData = null;      // Uint8Array，900 bytes
        let priceDataView = null;
        let dskPriceGroupIdx = 7;  // DSK 第8組 (index=7)

        // 地點資訊（從 DSK 第4組解壓，index=3）
        // 結構：20個欄位，每欄283個 uint16，每欄566 bytes
        const LOC_COUNT = 283;
        const LOC_FIELD_BYTES = LOC_COUNT * 2; // 566
        const LOC_FIELDS = {
            X: 0x0000, Y: 0x0236, SPECIAL: 0x046C,
            UNK3: 0x06A2, LEFT: 0x08D8, UP: 0x0B0E,
            RIGHT: 0x0D44, DOWN: 0x0F7A, SEGMENT: 0x11B0,
            UNK9: 0x13E6, UNKA: 0x161C, UNKB: 0x1852,
            OWNER: 0x1A88, UNKD: 0x1CBE, RESERVE: 0x1EF4,
            HOUSE: 0x212A, UNK10: 0x2360, UNK11: 0x2596,
            UNK12: 0x27CC, UNK13: 0x2A02
        };
        let locData = null; // Uint8Array，11320 bytes
        let locDataView = null;

        let selectedGridX = -1, selectedGridY = -1;
        let selectedTileIndex = -1; // 目前點選的圖塊編號

        // 畫個基礎網格方便看
        function drawGrid() {
            ctx.strokeStyle = '#333';
            for (let x = 0; x <= canvas.width; x += TILE_W) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += TILE_H) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }
        drawGrid();

        // 處理 PART?.PAK 封裝資料集[cite: 1]
        document.getElementById('mapFile').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                rawPakBuffer = event.target.result.slice(0); // 保留原始備份
                const buffer = new DataView(event.target.result);
                parseMapPak(buffer);
            };
            reader.readAsArrayBuffer(file);
        });

        function parseMapPak(dataView) {
            logMsg("幹，來真的了，開始解包 PART?.PAK...");

            // 1. 檢查檔頭，固定 FDh (253)
            if (dataView.getUint8(0) !== 0xFD) {
                logMsg("靠背，檔頭不是 FDh，你確定這是 PAK 檔？");
                return;
            }

            // 2. 跳過不明 4 byte (offset 1~4)
            // 3. 讀取封裝資料大小 2 byte (offset 5~6)
            let pakSize = dataView.getUint16(5, true);
            logMsg(`封裝資料區塊總大小: ${pakSize} bytes`);

            // 4. 開始讀取「各組資料位置指標」
            // 封裝資料集起點 = offset 7，指標值 * 2 是相對於此起點的偏移
            const PAK_DATA_BASE = 7;
            let ptrOffset = PAK_DATA_BASE;
            let groupPointers = [];
            let firstDataOffset = dataView.byteLength;

            while (ptrOffset < firstDataOffset && ptrOffset < dataView.byteLength) {
                let ptr = dataView.getUint16(ptrOffset, true);
                if (ptr === 0) break;

                let actualOffset = PAK_DATA_BASE + ptr * 2; // 實際位置 = 封裝資料集起點(7) + 指標值 * 2
                if (actualOffset >= dataView.byteLength) break;

                groupPointers.push(actualOffset);

                if (actualOffset < firstDataOffset) {
                    firstDataOffset = actualOffset;
                }
                ptrOffset += 2;
            }

            pakGroupPointers = groupPointers;
            logMsg(`解析到 ${groupPointers.length} 組資料指標。`);

            if (groupPointers.length < 2) {
                logMsg("雞歪，資料組數不對，至少要有地圖方塊跟座標資料！");
                return;
            }

            // 5. 解壓第 1 組資料：地圖方塊圖像 (每個 24x20 = 480 bytes)
            logMsg("正在解壓第 1 組：地圖方塊圖像...");
            let tilesData = decompressGeneralData(dataView, groupPointers[0]);
            mapTilesData = tilesData;
            let tileCount = Math.floor(tilesData.length / 480);
            logMsg(`解壓完成，共 ${tileCount} 個地圖方塊。`);

            // 6. 解壓第 2 組資料：各座標的地點編號 (36x36x2 = 2592 bytes)
            logMsg("正在解壓第 2 組：地圖座標陣列...");
            let gridData = decompressGeneralData(dataView, groupPointers[1]);
            if (gridData.length >= 2592) {
                let gridDataView = new DataView(gridData.buffer, gridData.byteOffset, gridData.byteLength);
                for (let i = 0; i < 1296; i++) {
                    mapGrid[i] = gridDataView.getUint16(i * 2, true); // 存入全域 mapGrid
                }
                logMsg("地圖邏輯座標載入成功！");

                if (isSaveLoaded) {
                    checkAndRenderRealMap();
                } else if (isPaletteLoaded) {
                    logMsg("存檔還沒載入，先 Dump 圖庫給你看...");
                    renderTilesetDump();
                } else {
                    logMsg("警告：你還沒載入 256.PAT 色盤！現在畫布上填的都是預設的黑色，趕快去把色盤載進來！");
                    drawGrid();
                }
            } else {
                logMsg("靠背，地圖座標解壓出來的大小不對！");
            }

            // 第三組文字訊息先不幹，你現在重點是圖像化編輯
        }

        // 真實的一般資料解壓法
        function decompressGeneralData(dataView, startOffset) {
            let output = [];
            let no = dataView.getUint16(startOffset, true); // 讀取 2 byte 整數，低位元組在前
            let currentPtr = startOffset + 2;

            // 處理解壓程序 no 次
            for (let i = 0; i < no; i++) {
                if (currentPtr >= dataView.byteLength) break; // 防呆

                let b = dataView.getUint8(currentPtr++);
                let c = (b & 0x7F) + 1; // c = (b低7位元) + 1
                let isHighBitSet = (b & 0x80) !== 0; // if b最高位元=1

                if (isHighBitSet) {
                    // 讀取 c byte 資料輸出
                    for (let j = 0; j < c; j++) {
                        output.push(dataView.getUint8(currentPtr++));
                    }
                } else {
                    // 讀取 1 byte
                    let repeatByte = dataView.getUint8(currentPtr++);
                    // 輸出這個 byte 共 c 次
                    for (let j = 0; j < c; j++) {
                        output.push(repeatByte);
                    }
                }
            }
            return new Uint8Array(output);
        }

        // 因為 PART?.PAK 沒有存地圖實際排版，這裡先把圖庫直接倒出來給你看
        function renderTilesetDump() {
            if (!mapTilesData || mapTilesData.length === 0) return;

            logMsg("開始將圖塊圖庫 Dump 到畫布上...");
            const imgData = ctx.createImageData(canvas.width, canvas.height);
            let totalTiles = Math.floor(mapTilesData.length / 480);

            // 依序把圖庫畫到 36x36 網格上展示
            for (let gy = 0; gy < GRID_ROWS; gy++) {
                for (let gx = 0; gx < GRID_COLS; gx++) {
                    let tileIndex = gy * GRID_COLS + gx;
                    if (tileIndex >= totalTiles) break;

                    let srcOffset = tileIndex * 480;
                    for (let ty = 0; ty < TILE_H; ty++) {
                        for (let tx = 0; tx < TILE_W; tx++) {
                            let colorIndex = mapTilesData[srcOffset + ty * TILE_W + tx];

                            let pxX = gx * TILE_W + tx;
                            let pxY = gy * TILE_H + ty;
                            let destOffset = (pxY * canvas.width + pxX) * 4;

                            // 根據色盤索引抓出轉換後的 RGB
                            imgData.data[destOffset] = palette[colorIndex * 3];
                            imgData.data[destOffset + 1] = palette[colorIndex * 3 + 1];
                            imgData.data[destOffset + 2] = palette[colorIndex * 3 + 2];
                            imgData.data[destOffset + 3] = 255; // Alpha 通道全滿
                        }
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
            drawGrid(); // 補上網格框線
        }

        // 處理 SAVE_?.DSK 存檔
        document.getElementById('saveFile').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                rawDskBuffer = event.target.result.slice(0); // 保留原始備份
                const buffer = new DataView(event.target.result);
                parseSaveDsk(buffer);
            };
            reader.readAsArrayBuffer(file);
        });

        function parseSaveDsk(dataView) {
            logMsg("開始解包 SAVE_?.DSK...");
            if (dataView.getUint8(0) !== 0xFD) {
                logMsg("靠背，檔頭不是 FDh，這不是正確的封裝檔案！");
                return;
            }

            // 封裝資料集起點 = offset 7，指標值 * 2 是相對於此起點的偏移
            const DSK_DATA_BASE = 7;
            let ptrOffset = DSK_DATA_BASE;
            let groupPointers = [];
            let firstDataOffset = dataView.byteLength;

            while (ptrOffset < firstDataOffset && ptrOffset < dataView.byteLength) {
                let ptr = dataView.getUint16(ptrOffset, true);
                if (ptr === 0) break;

                let actualOffset = DSK_DATA_BASE + ptr * 2; // 實際位置 = 封裝資料集起點(7) + 指標值 * 2
                if (actualOffset >= dataView.byteLength) break;

                groupPointers.push(actualOffset);

                if (actualOffset < firstDataOffset) {
                    firstDataOffset = actualOffset;
                }
                ptrOffset += 2;
            }

            dskGroupPointers = groupPointers;
            if (groupPointers.length < 6) {
                logMsg("雞歪，存檔資料組數不到 6 組，找不到第 (6) 組的地圖排版資料！");
                return;
            }

            logMsg("正在解壓第 6 組：地圖排版陣列...");
            // 第 6 組的 index 是 5
            let layoutData = decompressGeneralData(dataView, groupPointers[5]);

            if (layoutData.length >= 2592) {
                let layoutDataView = new DataView(layoutData.buffer, layoutData.byteOffset, layoutData.byteLength);
                for (let i = 0; i < 1296; i++) {
                    mapLayout[i] = layoutDataView.getUint16(i * 2, true);
                }
                isSaveLoaded = true;
                logMsg("存檔地圖排版載入成功！");
                // 同時解壓第4組（地點資訊，index=3）
                if (dskGroupPointers.length >= 4) {
                    let locRaw = decompressGeneralData(dataView, dskGroupPointers[3]);
                    if (locRaw.length === LOC_COUNT * 20 * 2) {
                        locData = locRaw;
                        locDataView = new DataView(locData.buffer, locData.byteOffset, locData.byteLength);
                        logMsg("地點資訊載入成功！");
                    } else {
                        logMsg(`地點資訊大小有異：${locRaw.length} bytes（預期 ${LOC_COUNT * 20 * 2}）`);
                    }
                }
                // 同時解壓第8組（價格表，index=7）
                if (dskGroupPointers.length >= 8) {
                    let priceRaw = decompressGeneralData(dataView, dskGroupPointers[7]);
                    priceData = priceRaw;
                    priceDataView = new DataView(priceData.buffer, priceData.byteOffset, priceData.byteLength);
                    logMsg(`價格表載入成功！(${priceRaw.length} bytes)`);
                }
                // 載入完成後跑全地圖警告掃描
                setTimeout(runValidation, 100);
                checkAndRenderRealMap();
            } else {
                logMsg("靠背，地圖排版解壓出來的大小不夠 2592 bytes！");
            }
        }

        // 真正的地圖渲染邏輯
        function checkAndRenderRealMap() {
            if (isPaletteLoaded && mapTilesData.length > 0 && isSaveLoaded) {
                logMsg("幹，三神器湊齊了！開始渲染真正的地圖...");

                const imgData = ctx.createImageData(canvas.width, canvas.height);
                let totalTiles = Math.floor(mapTilesData.length / 480);

                for (let gy = 0; gy < GRID_ROWS; gy++) {
                    for (let gx = 0; gx < GRID_COLS; gx++) {
                        let cellIndex = gy * GRID_COLS + gx;
                        let tileIndex = mapLayout[cellIndex]; // 從存檔抓出該網格真正的圖塊編號

                        if (tileIndex >= totalTiles) continue; // 防呆，避免圖塊編號越界

                        let srcOffset = tileIndex * 480;
                        for (let ty = 0; ty < TILE_H; ty++) {
                            for (let tx = 0; tx < TILE_W; tx++) {
                                let colorIndex = mapTilesData[srcOffset + ty * TILE_W + tx];

                                let pxX = gx * TILE_W + tx;
                                let pxY = gy * TILE_H + ty;
                                let destOffset = (pxY * canvas.width + pxX) * 4;

                                imgData.data[destOffset] = palette[colorIndex * 3];
                                imgData.data[destOffset + 1] = palette[colorIndex * 3 + 1];
                                imgData.data[destOffset + 2] = palette[colorIndex * 3 + 2];
                                imgData.data[destOffset + 3] = 255;
                            }
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
                drawGrid();
            } else {
                logMsg("還缺檔案喔！PAT、PAK、DSK 三個都要載入才會啟動真地圖模式。");
            }
        }

        // ── 標籤頁切換 ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabId).classList.add('active');
                if (tabId === 'tabWarn') runValidation();
            });
        });

        // ── 路段名稱顯示 ──
        function getSegName(segId) {
            if (segId <= 0) return '';
            if (segId < SEGMENT_NAMES.length) return SEGMENT_NAMES[segId];
            return extraSegNames[segId] || `地段${segId}`;
        }

        // ── 特殊地點名稱 ──
        function getSpecialName(spId) {
            return (spId > 0 && spId < SPECIAL_NAMES.length) ? SPECIAL_NAMES[spId] : '';
        }

        // 即時更新：特殊地點代號
        document.getElementById('editSpecial').addEventListener('input', function () {
            if (selectedGridX < 0) return;
            const locId = mapGrid[selectedGridY * GRID_COLS + selectedGridX];
            const spId = parseInt(this.value) || 0;
            document.getElementById('specialNameDisplay').textContent = getSpecialName(spId);
            if (locId > 0 && locData) setLocField(LOC_FIELDS.SPECIAL, locId, spId);
        });

        // ── 新增地段 ──
        const extraSegNames = {};
        const extraPriceData = {};

        document.getElementById('addSegBtn').addEventListener('click', function () {
            let maxSeg = PRICE_SEG_COUNT - 1;
            Object.keys(extraSegNames).forEach(k => { if (parseInt(k) > maxSeg) maxSeg = parseInt(k); });
            const newSegId = maxSeg + 1;
            if (newSegId > 99) { logMsg('地段數量已達上限 99！'); return; }
            const name = prompt(`新地段編號 ${newSegId}，請輸入名稱：`, `地段${newSegId}`);
            if (!name) return;
            extraSegNames[newSegId] = name;
            extraPriceData[newSegId] = {};
            if (selectedGridX >= 0) {
                const locId = mapGrid[selectedGridY * GRID_COLS + selectedGridX];
                document.getElementById('editSegId').value = newSegId;
                document.getElementById('segNameDisplay').textContent = name;
                if (locId > 0 && locData) {
                    setLocField(LOC_FIELDS.SEGMENT, locId, newSegId);
                    renderPriceTable(newSegId);
                }
            }
            logMsg(`新增地段 ${newSegId}：${name}`);
        });

        // ── 價格表讀寫 ──
        function getPriceField(fieldIdx, segId) {
            if (!priceDataView || segId <= 0 || segId >= PRICE_SEG_COUNT) return 0;
            return priceDataView.getUint16(fieldIdx * PRICE_FIELD_SIZE + segId * 2, true);
        }
        function setPriceField(fieldIdx, segId, val) {
            if (!priceDataView || segId <= 0 || segId >= PRICE_SEG_COUNT) return;
            priceDataView.setUint16(fieldIdx * PRICE_FIELD_SIZE + segId * 2, val, true);
        }

        function renderPriceTable(segId) {
            document.getElementById('priceSegLabel').textContent =
                segId > 0 ? `${segId} - ${getSegName(segId)}` : '無（非土地）';
            const tbody = document.getElementById('priceTbody');
            tbody.innerHTML = '';
            if (segId <= 0) { tbody.innerHTML = '<tr><td colspan="2" style="color:#888">此格非土地</td></tr>'; return; }
            const isExtra = segId >= PRICE_SEG_COUNT;
            PRICE_FIELDS.forEach((label, fi) => {
                let val;
                if (isExtra) {
                    val = (extraPriceData[segId] && extraPriceData[segId][fi] != null) ? extraPriceData[segId][fi] : 0;
                } else {
                    val = priceData ? getPriceField(fi, segId) : 0;
                }
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${label}</td><td><input type="number" min="0" max="65535" value="${val}" data-fi="${fi}" data-seg="${segId}" data-extra="${isExtra ? 1 : 0}"></td>`;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('input').forEach(inp => {
                inp.addEventListener('input', () => {
                    const fi = parseInt(inp.dataset.fi), seg = parseInt(inp.dataset.seg), v = parseInt(inp.value) || 0;
                    if (inp.dataset.extra === '1') {
                        if (!extraPriceData[seg]) extraPriceData[seg] = {};
                        extraPriceData[seg][fi] = v;
                    } else { setPriceField(fi, seg, v); }
                });
            });
        }

        // ── 警告掃描 ──
        let warnings = [];
        function runValidation() {
            warnings = [];
            if (!isSaveLoaded || !locData) { renderWarnList(); return; }

            // 統計各地點編號被哪幾格使用
            const locUsage = {}; // locId -> [cellIndex, ...]
            for (let i = 0; i < GRID_COLS * GRID_ROWS; i++) {
                const lid = mapGrid[i];
                if (lid === 0) continue;
                if (!locUsage[lid]) locUsage[lid] = [];
                locUsage[lid].push(i);
            }

            // 警告1：地點編號重複
            for (const [lid, cells] of Object.entries(locUsage)) {
                if (cells.length > 1) {
                    const coords = cells.map(ci => `(${ci % GRID_COLS},${Math.floor(ci / GRID_COLS)})`).join(', ');
                    warnings.push({ type: 'dup', cells, msg: `地點 ${lid} 重複用於 ${coords}` });
                }
            }

            // 警告2：行進方向對象不相鄰
            for (let ci = 0; ci < GRID_COLS * GRID_ROWS; ci++) {
                const lid = mapGrid[ci];
                if (lid <= 0) continue;
                const gx = ci % GRID_COLS, gy = Math.floor(ci / GRID_COLS);
                const dirs = [
                    { label: '左', field: LOC_FIELDS.LEFT, nx: gx - 1, ny: gy },
                    { label: '右', field: LOC_FIELDS.RIGHT, nx: gx + 1, ny: gy },
                    { label: '上', field: LOC_FIELDS.UP, nx: gx, ny: gy - 1 },
                    { label: '下', field: LOC_FIELDS.DOWN, nx: gx, ny: gy + 1 },
                ];
                dirs.forEach(d => {
                    const target = getLocField(d.field, lid);
                    if (target === 0) return;
                    // 目標地點應在相鄰格子上
                    if (d.nx < 0 || d.nx >= GRID_COLS || d.ny < 0 || d.ny >= GRID_ROWS) {
                        warnings.push({ type: 'dir', cells: [ci], msg: `地點 ${lid} (${gx},${gy}) 往${d.label}→地點 ${target}，但超出地圖邊界` });
                        return;
                    }
                    const neighborLid = mapGrid[d.ny * GRID_COLS + d.nx];
                    if (neighborLid !== target) {
                        warnings.push({ type: 'dir', cells: [ci], msg: `地點 ${lid} (${gx},${gy}) 往${d.label}→地點 ${target}，但鄰格是地點 ${neighborLid}` });
                    }
                });
            }

            // 更新警告頁標籤數字
            const warnTab = document.querySelector('[data-tab="tabWarn"]');
            warnTab.textContent = warnings.length > 0 ? `⚠ 警告 (${warnings.length})` : '✅ 無警告';
            renderWarnList();
        }

        function renderWarnList() {
            const list = document.getElementById('warnList');
            if (warnings.length === 0) { list.innerHTML = '<div style="color:#4ec9b0">✅ 目前無警告</div>'; return; }
            list.innerHTML = '';
            warnings.forEach(w => {
                const div = document.createElement('div');
                div.textContent = w.msg;
                div.addEventListener('click', () => {
                    if (w.cells && w.cells.length > 0) {
                        // 跳至第一個問題格
                        const ci = w.cells[0];
                        const gx = ci % GRID_COLS, gy = Math.floor(ci / GRID_COLS);
                        // 模擬點擊那個格子
                        simulateSelectCell(gx, gy);
                    }
                });
                list.appendChild(div);
            });
        }

        // 讀取地點資訊某欄位的某地點值
        function getLocField(field_offset, loc_id) {
            if (!locDataView || loc_id <= 0 || loc_id >= LOC_COUNT) return 0;
            return locDataView.getUint16(field_offset + loc_id * 2, true);
        }
        function setLocField(field_offset, loc_id, val) {
            if (!locDataView || loc_id <= 0 || loc_id >= LOC_COUNT) return;
            locDataView.setUint16(field_offset + loc_id * 2, val, true);
        }

        // 從程式碼觸發選取某格（警告跳轉用）
        function simulateSelectCell(gx, gy) {
            openEditPanel(gx, gy);
            // 切到警告頁以外的頁面
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelector('[data-tab="tabLoc"]').classList.add('active');
            document.getElementById('tabLoc').classList.add('active');
        }

        // 建立圖塊選擇器（只建一次）
        function buildTilePicker() {
            const wrap = document.getElementById('tilePickerWrap');
            if (wrap.children.length > 0) return; // 已建過
            const totalTiles = Math.floor(mapTilesData.length / 480);
            for (let t = 0; t < totalTiles; t++) {
                const c = document.createElement('canvas');
                c.width = TILE_W; c.height = TILE_H;
                c.className = 'tile-btn';
                c.title = `圖塊 #${t}`;
                const tctx = c.getContext('2d');
                const img = tctx.createImageData(TILE_W, TILE_H);
                const src = t * 480;
                for (let p = 0; p < 480; p++) {
                    const ci = mapTilesData[src + p];
                    img.data[p * 4] = palette[ci * 3];
                    img.data[p * 4 + 1] = palette[ci * 3 + 1];
                    img.data[p * 4 + 2] = palette[ci * 3 + 2];
                    img.data[p * 4 + 3] = 255;
                }
                tctx.putImageData(img, 0, 0);
                c.addEventListener('click', () => {
                    document.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('selected'));
                    c.classList.add('selected');
                    selectedTileIndex = t;
                    // 立即生效
                    if (selectedGridX >= 0) {
                        mapLayout[selectedGridY * GRID_COLS + selectedGridX] = t;
                        checkAndRenderRealMap();
                        ctx.strokeStyle = '#e51400';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(selectedGridX * TILE_W, selectedGridY * TILE_H, TILE_W, TILE_H);
                        ctx.lineWidth = 1;
                    }
                });
                wrap.appendChild(c);
            }
        }

        // 核心：開啟某格的編輯面板（mousedown 和 警告跳轉都用這個）
        function openEditPanel(gridX, gridY) {
            selectedGridX = gridX;
            selectedGridY = gridY;

            const cellIndex = gridY * GRID_COLS + gridX;
            const locId = mapGrid[cellIndex];
            const tileId = mapLayout[cellIndex];

            const isLand = locId > 0x32;
            const typeStr = locId === 0 ? '非地點' : (isLand ? '土地' : '特殊地點');

            // 視覺化
            checkAndRenderRealMap();
            ctx.strokeStyle = '#e51400';
            ctx.lineWidth = 2;
            ctx.strokeRect(gridX * TILE_W, gridY * TILE_H, TILE_W, TILE_H);
            ctx.lineWidth = 1;

            const spId = locId > 0 && locData ? getLocField(LOC_FIELDS.SPECIAL, locId) : 0;
            const segId2 = locId > 0 && locData ? getLocField(LOC_FIELDS.SEGMENT, locId) : 0;
            infoBox.innerHTML = `
                網格 (${gridX}, ${gridY})　地點：<b>${locId}</b>　圖塊：<b>${tileId}</b><br>
                屬性：<span style="color:#d16969">${typeStr}</span>
                ${spId > 0 ? `　<b style="color:#ce9178">${getSpecialName(spId)}</b>(代號${spId})` : ''}
                ${segId2 > 0 ? `　地段<b>${segId2}</b> ${getSegName(segId2)}` : ''}
            `;

            document.getElementById('editPanel').style.display = 'block';
            document.getElementById('editTitle').textContent = `編輯 (${gridX}, ${gridY})  地點 ${locId}`;

            // 圖塊選擇器
            if (mapTilesData.length > 0) {
                buildTilePicker();
                selectedTileIndex = tileId;
                document.querySelectorAll('.tile-btn').forEach((b, i) => b.classList.toggle('selected', i === tileId));
                const wrap = document.getElementById('tilePickerWrap');
                const sel = wrap.children[tileId];
                if (sel) sel.scrollIntoView({ block: 'nearest' });
            }

            // 地點頁
            document.getElementById('editLocId').value = locId;
            if (locId > 0 && locData) {
                const segId = getLocField(LOC_FIELDS.SEGMENT, locId);
                const spId = getLocField(LOC_FIELDS.SPECIAL, locId);
                document.getElementById('editSegId').value = segId;
                document.getElementById('segNameDisplay').textContent = getSegName(segId);
                document.getElementById('editSpecial').value = spId;
                document.getElementById('specialNameDisplay').textContent = getSpecialName(spId);
                document.getElementById('editDirLeft').value = getLocField(LOC_FIELDS.LEFT, locId);
                document.getElementById('editDirUp').value = getLocField(LOC_FIELDS.UP, locId);
                document.getElementById('editDirRight').value = getLocField(LOC_FIELDS.RIGHT, locId);
                document.getElementById('editDirDown').value = getLocField(LOC_FIELDS.DOWN, locId);
            } else {
                ['editSegId', 'editSpecial', 'editDirLeft', 'editDirUp', 'editDirRight', 'editDirDown'].forEach(id => {
                    document.getElementById(id).value = 0;
                });
                document.getElementById('segNameDisplay').textContent = '';
                document.getElementById('specialNameDisplay').textContent = '';
            }

            // 價格頁
            const segForPrice = locId > 0 ? getLocField(LOC_FIELDS.SEGMENT, locId) : 0;
            renderPriceTable(segForPrice);

            validateDirWarnings(locId, gridX, gridY);
        }

        // 即時更新：地點編號
        document.getElementById('editLocId').addEventListener('input', function () {
            if (selectedGridX < 0) return;
            const newLocId = parseInt(this.value) || 0;
            mapGrid[selectedGridY * GRID_COLS + selectedGridX] = newLocId;
            document.getElementById('editTitle').textContent = `編輯 (${selectedGridX}, ${selectedGridY})  地點 ${newLocId}`;
            if (newLocId > 0 && locData) {
                const segId = getLocField(LOC_FIELDS.SEGMENT, newLocId);
                const spId = getLocField(LOC_FIELDS.SPECIAL, newLocId);
                document.getElementById('editSegId').value = segId;
                document.getElementById('segNameDisplay').textContent = getSegName(segId);
                document.getElementById('editSpecial').value = spId;
                document.getElementById('specialNameDisplay').textContent = getSpecialName(spId);
                document.getElementById('editDirLeft').value = getLocField(LOC_FIELDS.LEFT, newLocId);
                document.getElementById('editDirUp').value = getLocField(LOC_FIELDS.UP, newLocId);
                document.getElementById('editDirRight').value = getLocField(LOC_FIELDS.RIGHT, newLocId);
                document.getElementById('editDirDown').value = getLocField(LOC_FIELDS.DOWN, newLocId);
                renderPriceTable(segId);
                validateDirWarnings(newLocId, selectedGridX, selectedGridY);
            }
        });

        // 即時更新：地段編號
        document.getElementById('editSegId').addEventListener('input', function () {
            if (selectedGridX < 0) return;
            const locId = mapGrid[selectedGridY * GRID_COLS + selectedGridX];
            const segId = parseInt(this.value) || 0;
            document.getElementById('segNameDisplay').textContent = getSegName(segId);
            if (locId > 0) { setLocField(LOC_FIELDS.SEGMENT, locId, segId); renderPriceTable(segId); }
        });

        // 即時更新：行進方向（並立即跑方向警告）
        function dirInputHandler(fieldConst) {
            return function () {
                if (selectedGridX < 0) return;
                const locId = mapGrid[selectedGridY * GRID_COLS + selectedGridX];
                if (locId > 0) { setLocField(fieldConst, locId, parseInt(this.value) || 0); }
                validateDirWarnings(locId, selectedGridX, selectedGridY);
            };
        }
        document.getElementById('editDirLeft').addEventListener('input', dirInputHandler(LOC_FIELDS.LEFT));
        document.getElementById('editDirUp').addEventListener('input', dirInputHandler(LOC_FIELDS.UP));
        document.getElementById('editDirRight').addEventListener('input', dirInputHandler(LOC_FIELDS.RIGHT));
        document.getElementById('editDirDown').addEventListener('input', dirInputHandler(LOC_FIELDS.DOWN));

        // 即時方向警告（只針對目前選取格）
        function validateDirWarnings(locId, gx, gy) {
            const msgs = [];
            if (locId <= 0 || !locData) { document.getElementById('dirWarnMsg').textContent = ''; return; }
            const dirs = [
                { label: '左', field: LOC_FIELDS.LEFT, nx: gx - 1, ny: gy },
                { label: '右', field: LOC_FIELDS.RIGHT, nx: gx + 1, ny: gy },
                { label: '上', field: LOC_FIELDS.UP, nx: gx, ny: gy - 1 },
                { label: '下', field: LOC_FIELDS.DOWN, nx: gx, ny: gy + 1 },
            ];
            dirs.forEach(d => {
                const target = getLocField(d.field, locId);
                if (target === 0) return;
                if (d.nx < 0 || d.nx >= GRID_COLS || d.ny < 0 || d.ny >= GRID_ROWS) {
                    msgs.push(`⚠ 往${d.label}→${target} 超出地圖`); return;
                }
                const neighborLid = mapGrid[d.ny * GRID_COLS + d.nx];
                if (neighborLid !== target) msgs.push(`⚠ 往${d.label}→${target}，鄰格實際是 ${neighborLid}`);
            });
            document.getElementById('dirWarnMsg').textContent = msgs.join('　');
        }

        // 處理滑鼠點擊，顯示地圖座標資訊並開啟編輯選單
        canvas.addEventListener('mousedown', function (e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            const gridX = Math.floor(x / TILE_W);
            const gridY = Math.floor(y / TILE_H);
            if (gridX < 0 || gridX >= GRID_COLS || gridY < 0 || gridY >= GRID_ROWS) return;

            openEditPanel(gridX, gridY);
        });

        // ── 壓縮函式（實作真正的 RLE 壓縮，並加入偶數對齊防崩潰機制） ──
        function compressGeneralData(inputBytes) {
            let output = [];
            let i = 0;
            let chunks = 0;

            while (i < inputBytes.length) {
                // 1. 計算當前位置有幾個連續相同的 byte
                let repeatCount = 1;
                while (i + repeatCount < inputBytes.length &&
                    repeatCount < 128 &&
                    inputBytes[i + repeatCount] === inputBytes[i]) {
                    repeatCount++;
                }

                // 2. 如果連續相同數量 >= 3，值得切換為壓縮模式 (最高位元=0)
                if (repeatCount >= 3) {
                    output.push(repeatCount - 1); // 最高位=0，低7位=len-1
                    output.push(inputBytes[i]);   // 輸出的重複值
                    i += repeatCount;
                    chunks++;
                }
                // 3. 否則維持 Raw 模式 (最高位元=1)
                else {
                    let rawCount = 0;
                    // 找出多長的區段內「沒有」連續 3 個以上的相同數值
                    while (i + rawCount < inputBytes.length && rawCount < 128) {
                        if (i + rawCount + 2 < inputBytes.length &&
                            inputBytes[i + rawCount] === inputBytes[i + rawCount + 1] &&
                            inputBytes[i + rawCount] === inputBytes[i + rawCount + 2]) {
                            break; // 遇到可以壓縮的連續區段，提早截斷 raw 模式
                        }
                        rawCount++;
                    }

                    output.push(0x80 | (rawCount - 1)); // 最高位=1，低7位=len-1
                    for (let j = 0; j < rawCount; j++) {
                        output.push(inputBytes[i + j]);
                    }
                    i += rawCount;
                    chunks++;
                }
            }

            // --- 解決 DOS 遊戲閃退崩潰的核心關鍵 ---
            // 檢查產出的資料長度，如果遇到奇數，就補一個 0x00 把它變偶數
            // 這樣指標偏移量除以 2 就不會有小數被捨去的問題，下個區塊也就不會錯位
            let isOdd = (output.length % 2 !== 0);

            // 如果是奇數，長度多宣告 1 byte 的空間來填充
            let result = new Uint8Array(2 + output.length + (isOdd ? 1 : 0));

            result[0] = chunks & 0xFF;
            result[1] = (chunks >> 8) & 0xFF;
            result.set(output, 2);
            // 陣列預設值為 0，所以若 isOdd 為 true，最後一個 byte 會自然保留為 0 作為 Padding

            return result;
        }

        // 把修改後的資料重新壓縮，替換 DSK 中的某組資料，回傳新的 Uint8Array
        function replaceGroupInDsk(dskBytes, groupPointers, groupIndex, newData) {
            const DSK_DATA_BASE = 7;
            const newCompressed = compressGeneralData(newData);
            const groupStart = groupPointers[groupIndex];
            const groupEnd = (groupIndex + 1 < groupPointers.length)
                ? groupPointers[groupIndex + 1] : dskBytes.length;
            const delta = newCompressed.length - (groupEnd - groupStart);

            const newTotal = dskBytes.length + delta;
            const newBuf = new Uint8Array(newTotal);
            newBuf.set(dskBytes.slice(0, groupStart), 0);
            newBuf.set(newCompressed, groupStart);
            newBuf.set(dskBytes.slice(groupEnd), groupStart + newCompressed.length);

            // 更新檔頭封裝資料大小
            const dv = new DataView(newBuf.buffer);
            dv.setUint16(5, newTotal - 7, true);

            // 更新 groupIndex+1 之後的各組指標
            const updatedPtrs = groupPointers.slice();
            for (let i = groupIndex + 1; i < updatedPtrs.length; i++) {
                updatedPtrs[i] += delta;
                const ptrVal = (updatedPtrs[i] - DSK_DATA_BASE) / 2;
                dv.setUint16(DSK_DATA_BASE + i * 2, ptrVal, true);
            }
            return { bytes: newBuf, ptrs: updatedPtrs };
        }

        // 把修改後的 mapLayout + 地點資訊重新壓縮回 DSK
        function rebuildDskBuffer() {
            if (!rawDskBuffer || dskGroupPointers.length < 6) {
                logMsg("靠北，DSK 還沒載入！");
                return null;
            }

            let curBytes = new Uint8Array(rawDskBuffer);
            let curPtrs = dskGroupPointers.slice();

            // 替換第4組：地點資訊 (index=3)
            if (locData) {
                const r = replaceGroupInDsk(curBytes, curPtrs, 3, locData);
                curBytes = r.bytes; curPtrs = r.ptrs;
                logMsg("地點資訊已重新壓縮。");
            }

            // 合併新增地段到 priceData
            if (priceData && Object.keys(extraPriceData).length > 0) {
                let maxSeg = PRICE_SEG_COUNT - 1;
                Object.keys(extraPriceData).forEach(k => { if (parseInt(k) > maxSeg) maxSeg = parseInt(k); });
                const newSegCount = maxSeg + 1;
                const newFieldSize = newSegCount * 2;
                const newPriceArr = new Uint8Array(PRICE_FIELD_COUNT * newSegCount * 2);
                const newPriceDV = new DataView(newPriceArr.buffer);
                for (let fi = 0; fi < PRICE_FIELD_COUNT; fi++) {
                    for (let si = 0; si < PRICE_SEG_COUNT; si++) {
                        newPriceDV.setUint16(fi * newFieldSize + si * 2, priceDataView.getUint16(fi * PRICE_FIELD_SIZE + si * 2, true), true);
                    }
                }
                Object.entries(extraPriceData).forEach(([segStr, fields]) => {
                    const si = parseInt(segStr);
                    Object.entries(fields).forEach(([fiStr, v]) => {
                        newPriceDV.setUint16(parseInt(fiStr) * newFieldSize + si * 2, v, true);
                    });
                });
                priceData = newPriceArr; priceDataView = newPriceDV;
            }

            // 替換第8組：價格表 (index=7)
            if (priceData) {
                const r = replaceGroupInDsk(curBytes, curPtrs, 7, priceData);
                curBytes = r.bytes; curPtrs = r.ptrs;
                logMsg("價格表已重新壓縮。");
            }

            // 替換第6組：地圖排版 (index=5)
            const layoutBytes = new Uint8Array(1296 * 2);
            const ldv = new DataView(layoutBytes.buffer);
            for (let i = 0; i < 1296; i++) ldv.setUint16(i * 2, mapLayout[i], true);
            const r2 = replaceGroupInDsk(curBytes, curPtrs, 5, layoutBytes);
            curBytes = r2.bytes;

            logMsg(`DSK 重建完成，新大小: ${curBytes.length} bytes (原: ${rawDskBuffer.byteLength} bytes)`);
            return curBytes.buffer;
        }

        function downloadBuffer(buffer, filename) {
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('exportDskBtn').addEventListener('click', function () {
            if (!isSaveLoaded) { logMsg("還沒載入 DSK！"); return; }
            let buf = rebuildDskBuffer();
            if (buf) { downloadBuffer(buf, 'SAVE_?.DSK'); logMsg("DSK 匯出完成！"); }
        });

        document.getElementById('exportPakBtn').addEventListener('click', function () {
            if (!rawPakBuffer) { logMsg("還沒載入 PAK！"); return; }
            // PAK 目前只顯示不編輯，直接把原始 buffer 吐回去
            downloadBuffer(rawPakBuffer, 'PART?.PAK');
            logMsg("PAK 匯出完成（目前為原始未修改版）。");
        });

        function logMsg(msg) {
            infoBox.innerHTML += `<br>> ${msg}`;
            infoBox.scrollTop = infoBox.scrollHeight;
        }
    </script>
